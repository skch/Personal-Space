<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ header.title }} - PA</title>
    <!-- Bootstrap 5 CSS -->
    <!--link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"-->
    <link rel= "stylesheet" type= "text/css" href= "{{ url_for('static',filename='cosmo.bootstrap.min.css') }}">
    <link rel= "stylesheet" type= "text/css" href= "{{ url_for('static',filename='base.css') }}">
    <link rel= "stylesheet" type= "text/css" href= "{{ url_for('static',filename='timeline.css') }}">
		<link rel="icon" type="image/png" href="{{ url_for('static',filename='favicon-96x96.png') }}" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="{{ url_for('static',filename='favicon.svg') }}" />
		<link rel="shortcut icon" href="{{ url_for('static',filename='favicon.ico') }}" />
		<link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static',filename='apple-touch-icon.png') }}" />
		<meta name="apple-mobile-web-app-title" content="PAx" />
		<link rel="manifest" href="{{ url_for('static',filename='site.webmanifest') }}" />
    <style>
        body { padding-top: 60px; }
        .content-area { padding: 20px; }
        img { max-width: 100%; height: auto; }
        
        /* Basic GitHub-like markdown container styles */
        .markdown-body {
            font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
            font-size: 16px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .markdown-body table {
            display: block;
            width: 100%;
            overflow: auto;
            margin-top: 0;
            margin-bottom: 16px;
            border-spacing: 0;
            border-collapse: collapse;
        }
        .markdown-body table th,
        .markdown-body table td {
            padding: 6px 13px;
            border: 1px solid #d0d7de;
        }
        .markdown-body table tr {
            background-color: #ffffff;
            border-top: 1px solid #d0d7de;
        }
        .markdown-body table tr:nth-child(2n) {
            background-color: #f6f8fa;
        }
        .markdown-body pre {
            padding: 16px;
            overflow: auto;
            font-size: 85%;
            line-height: 1.45;
            background-color: #f6f8fa;
            border-radius: 6px;
        }
        .markdown-body code {
            padding: .2em .4em;
            margin: 0;
            font-size: 85%;
            background-color: rgba(175,184,193,0.2);
            border-radius: 6px;
        }
        .markdown-body pre code {
            padding: 0;
            font-size: 100%;
            word-break: normal;
            white-space: pre;
            background: transparent;
            border: 0;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">{{ header.logo }}</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="/wiki">📓 Wiki</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/calendar">📅 Calendar</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/contacts">👤 Contacts</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/tasks">☑ Tasks</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container content-area">
        {% block content %}{% endblock %}
    </div>
    
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Mermaid JS for diagrams -->
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
        mermaid.initialize({ startOnLoad: true });
        
        // Convert markdown Python fenced code blocks for mermaid into actual mermaid divs
        document.addEventListener("DOMContentLoaded", function() {
            const mCodes = document.querySelectorAll('code.language-mermaid');
            mCodes.forEach(function(code) {
                const pre = code.parentNode;
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = code.textContent;
                pre.parentNode.replaceChild(div, pre);
            });
        });
    </script>
</body>
</html>
