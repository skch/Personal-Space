{% extends 'base.html' %}
{% block content %}
<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="/tasks">Tasks</a></li>
        <li class="breadcrumb-item"><a href="/tasks/{{ event.id }}">{{ event.id }}</a></li>
        <li class="breadcrumb-item active" aria-current="page">Edit</li>
    </ol>
</nav>

<div class="card shadow-sm border-0">
	<div class="card-header bg-white border-bottom-0 pt-4 pb-0">
		<h4 class="text-primary fw-bold">Edit Event</h4>
	</div>
	<div class="card-body">
		<form method="POST">
			<input type="hidden" name="path" value="{{ event.path }}">
			<div class="mb-3">
				<label for="title" class="form-label fw-bold">Title</label>
				<input type="text" class="form-control" id="title" name="title" value="{{ event.title }}" required>
			</div>
			<div class="row">
				<div class="col-md-4 mb-3">
						<label for="date" class="form-label fw-bold">Date</label>
						<input type="date" class="form-control" id="date" name="date" value="{{ event.date }}">
				</div>
				<div class="col-md-4 mb-3">
						<label for="time" class="form-label fw-bold">Time</label>
						<input type="time" class="form-control" id="time" name="time" value="{{ event.start }}">
				</div>
				<div class="col-md-4 mb-3">
					<label for="duration" class="form-label fw-bold">Durartion (min)</label>
					<input type="number" class="form-control" id="duration" name="duration" value="{{ event.duration }}">
				</div>
			</div>
			<div class="row">
				<div class="col-md-4 mb-3">
						<label for="size" class="form-label fw-bold">Meeting Size</label>
						<select class="form-select" id="size" name="size">
								<option value="Small" {% if event.size == 'Small' %}selected{% endif %}>Small (1-3 people)</option>
								<option value="Medium" {% if event.size == 'Medium' %}selected{% endif %}>Medium (4-6 people)</option>
								<option value="Large" {% if event.size == 'Large' %}selected{% endif %}>Large (7 and more)</option>
						</select>
				</div>

				<div class="col-md-4 mb-3">
					<label for="organizer" class="form-label fw-bold">Organizer</label>
					<input type="text" class="form-control" id="organizer" name="organizer" value="{{ event.organizer }}">
				</div>
				<div class="col-md-4 mb-3">
						<label for="repeats" class="form-label fw-bold">Repeats every</label>
						<input type="text" class="form-control" id="repeats" name="repeats" value="{{ event.repeats }}">
				</div>
			</div>

			<div class="row">
				<div class="col-md-4 mb-3">
					<div class="form-check form-check-inline">
						<input name="icon_imp" {{ event.tag_imp }} class="form-check-input" type="checkbox" id="ch1">
						<label class="form-check-label" for="ch1">❗️</label>
					</div>
					<div class="form-check form-check-inline">
						<input name="icon_quest" {{ event.tag_quest }} class="form-check-input" type="checkbox" id="ch1">
						<label class="form-check-label" for="ch1">❓️</label>
					</div>
					<div class="form-check form-check-inline">
						<input name="icon_person" {{ event.tag_person }} class="form-check-input" type="checkbox" id="ch2">
						<label class="form-check-label" for="ch2">👨‍</label>
					</div>
					<div class="form-check form-check-inline">
						<input name="icon_call" {{ event.tag_call }} class="form-check-input" type="checkbox" id="ch2">
						<label class="form-check-label" for="ch2">📞</label>
					</div>
				</div>
			</div>
			<div class="mb-3">
					<label for="content" class="form-label fw-bold">Description (Markdown)</label>
					<textarea class="form-control font-monospace bg-light" id="content" name="content" rows="12">{{ event.content }}</textarea>
			</div>
			<div class="mt-4">
					<button type="submit" class="btn btn-success px-4 rounded-pill shadow-sm me-2">Save Event</button>
					<a href="/calendar/{{ event.id }}/next" class="btn btn-outline-info px-4 rounded-pill">Create Next</a>
					<a href="/calendar/{{ event.id }}/move" class="btn btn-outline-info px-4 rounded-pill">Move Next</a>
					<a href="/calendar" class="btn btn-outline-secondary px-4 rounded-pill">Cancel</a>
			</div>
		</form>
	</div>
</div>
	<pre>{{ event.path }}</pre>
{% endblock %}
